openapi: 3.1.0
info:
  title: Capital.com REST API
  description: >-
    The Capital.com REST API provides programmatic access to the Capital.com
    trading engine, including positions, working orders, deal confirmations,
    account information, account switching, transaction history, account
    preferences (leverage, hedging mode), market navigation, instruments,
    and historical price data. Authentication uses an API key plus login
    credentials to create a session that returns CST and X-SECURITY-TOKEN
    headers, which expire after ten minutes of inactivity.
  version: 'v1'
  contact:
    name: Capital.com API Support
    url: https://open-api.capital.com
externalDocs:
  description: Capital.com Public API Documentation
  url: https://open-api.capital.com
servers:
- url: https://api-capital.backend-capital.com
  description: Capital.com production REST API server
- url: https://demo-api-capital.backend-capital.com
  description: Capital.com demo (sandbox) REST API server
tags:
- name: General
  description: Server time, ping, and encryption-key utility endpoints.
- name: Session
  description: Operations for creating, switching, and ending API sessions.
- name: Accounts
  description: Account information, preferences, and demo top-up.
- name: History
  description: Account activity and transaction history.
- name: Positions
  description: Operations for opening, updating, and closing trading positions.
- name: Working Orders
  description: Operations for managing limit and stop working orders.
- name: Markets
  description: Market navigation and instrument lookup.
security:
- apiKey: []
  sessionToken: []
  securityToken: []
paths:
  /api/v1/time:
    get:
      operationId: getServerTime
      summary: Get Server Time
      description: Returns the current Capital.com server time.
      tags:
      - General
      responses:
        '200':
          description: Server time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /api/v1/ping:
    get:
      operationId: ping
      summary: Ping the Service
      description: Returns a simple OK response to verify connectivity.
      tags:
      - General
      responses:
        '200':
          description: Service is reachable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /api/v1/session/encryptionKey:
    get:
      operationId: getEncryptionKey
      summary: Get Encryption Key
      description: Returns the public encryption key used to encrypt the session password.
      tags:
      - Session
      responses:
        '200':
          description: Encryption key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /api/v1/session:
    get:
      operationId: getSession
      summary: Get Session Details
      description: Returns details of the currently active API session.
      tags:
      - Session
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createSession
      summary: Create New Session
      description: Authenticates with API key and login credentials to create a new session.
      tags:
      - Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: switchAccount
      summary: Switch Active Account
      description: Switches the active account associated with the current session.
      tags:
      - Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Account switched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
    delete:
      operationId: logOutSession
      summary: Log Out Session
      description: Terminates the current API session.
      tags:
      - Session
      responses:
        '200':
          description: Session terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /api/v1/accounts:
    get:
      operationId: listAccounts
      summary: List Accounts
