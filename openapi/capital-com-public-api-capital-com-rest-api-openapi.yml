          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Demo balance adjusted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /api/v1/history/activity:
    get:
      operationId: getActivityHistory
      summary: Get Activity History
      description: Returns the account activity history.
